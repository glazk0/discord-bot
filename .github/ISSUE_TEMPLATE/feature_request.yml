name: Feature request
description: Suggest a new capability or improvement.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or limitation does this address?
      placeholder: When I try to X, the bot doesn't…
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should the bot behave? Slash command shape, expected output, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why they're less suitable.

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Screenshots, links, references.
