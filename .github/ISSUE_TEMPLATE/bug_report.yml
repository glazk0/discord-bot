name: Bug report
description: Report something that isn't working as expected.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? What did you expect to happen?
      placeholder: When I run /ping the bot replies with…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the bug.
      placeholder: |
        1. Invite the bot with permissions X
        2. Run `/foo bar`
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Any error output, stack traces, or shard logs. Code blocks help.
      render: shell

  - type: input
    id: version
    attributes:
      label: Bot version / commit SHA
      placeholder: main@abcdef0
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, deployment (Docker / bare metal / hosted).
      placeholder: Node 22.18 on Linux, Docker compose
